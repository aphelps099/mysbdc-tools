<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           FIXED: Do not modify these styles
           They define the Anthropic branding and layout
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #faf8f5 0%, #f0ebe4 50%, #e8e0d8 100%);
            min-height: 100vh;
            color: #2d2a26;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(180, 170, 158, 0.3);
            background: rgba(250, 248, 245, 0.8);
            backdrop-filter: blur(10px);
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #c96442, #d4845a);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .header h1 {
            font-family: 'Lora', serif;
            font-size: 18px;
            font-weight: 600;
            color: #2d2a26;
        }

        .header .subtitle {
            font-size: 12px;
            color: #8a7f72;
            font-weight: 300;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 65px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: rgba(250, 248, 245, 0.6);
            border-right: 1px solid rgba(180, 170, 158, 0.3);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-section h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a7f72;
            margin-bottom: 4px;
        }

        /* Seed Controls - FIXED */
        .seed-display {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 600;
            color: #c96442;
            text-align: center;
            padding: 8px;
        }

        .seed-nav {
            display: flex;
            gap: 6px;
        }

        .seed-nav button {
            flex: 1;
            padding: 8px 4px;
            border: 1px solid rgba(180, 170, 158, 0.4);
            border-radius: 6px;
            background: white;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: #2d2a26;
            cursor: pointer;
            transition: all 0.2s;
        }

        .seed-nav button:hover {
            background: #c96442;
            color: white;
            border-color: #c96442;
        }

        .seed-jump {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .seed-jump input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid rgba(180, 170, 158, 0.4);
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            background: white;
            color: #2d2a26;
            outline: none;
        }

        .seed-jump input:focus {
            border-color: #c96442;
        }

        .seed-jump button {
            padding: 7px 14px;
            border: 1px solid #c96442;
            border-radius: 6px;
            background: #c96442;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .seed-jump button:hover {
            background: #b85636;
        }

        /* Parameter Controls - VARIABLE */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 500;
            color: #5a5347;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(180, 170, 158, 0.3);
            border-radius: 2px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #c96442;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #c96442;
            cursor: pointer;
            border: none;
        }

        .value-display {
            font-size: 11px;
            color: #8a7f72;
            text-align: right;
        }

        .control-group input[type="color"] {
            width: 100%;
            height: 32px;
            border: 1px solid rgba(180, 170, 158, 0.4);
            border-radius: 6px;
            cursor: pointer;
            padding: 2px;
            background: white;
        }

        /* Action Buttons - FIXED */
        .action-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(180, 170, 158, 0.4);
            border-radius: 8px;
            background: white;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #2d2a26;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #f5f0eb;
            border-color: #c96442;
        }

        .action-btn.primary {
            background: #c96442;
            color: white;
            border-color: #c96442;
        }

        .action-btn.primary:hover {
            background: #b85636;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: auto;
        }

        .canvas-area canvas {
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        }

        /* Divider line between sidebar sections */
        .sidebar-divider {
            height: 1px;
            background: rgba(180, 170, 158, 0.3);
            margin: 4px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid rgba(180, 170, 158, 0.3);
                max-height: 40vh;
            }
            .canvas-area {
                min-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================
         FIXED: Header - Do not modify
         ============================================ -->
    <div class="header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div>
            <!-- VARIABLE: Change the title and subtitle for your artwork -->
            <h1>Algorithmic Art</h1>
            <div class="subtitle">Generative Art Viewer</div>
        </div>
    </div>

    <div class="main-container">
        <!-- ============================================
             SIDEBAR: Mix of FIXED and VARIABLE sections
             ============================================ -->
        <div class="sidebar">

            <!-- ==========================================
                 FIXED: Seed Section - Do not modify
                 ========================================== -->
            <div class="sidebar-section">
                <h3>Seed</h3>
                <div class="seed-display" id="seed-display">12345</div>
                <div class="seed-nav">
                    <button onclick="prevSeed()">&#9664; Prev</button>
                    <button onclick="nextSeed()">Next &#9654;</button>
                    <button onclick="randomSeed_()">Random</button>
                </div>
                <div class="seed-jump">
                    <input type="number" id="seed-input" placeholder="Enter seed...">
                    <button onclick="jumpToSeed()">Go</button>
                </div>
            </div>

            <div class="sidebar-divider"></div>

            <!-- ==========================================
                 VARIABLE: Parameters Section
                 Replace these controls with your algorithm's parameters.
                 Add as many control-group divs as needed.
                 ========================================== -->
            <div class="sidebar-section" id="parameters-section">
                <h3>Parameters</h3>

                <!-- Example parameter - REPLACE with your own -->
                <div class="control-group">
                    <label>Particle Count</label>
                    <input type="range" id="particleCount" min="100" max="5000" step="100" value="1000" oninput="updateParam('particleCount', this.value)">
                    <span class="value-display" id="particleCount-value">1000</span>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <input type="range" id="noiseScale" min="0.001" max="0.01" step="0.001" value="0.003" oninput="updateParam('noiseScale', this.value)">
                    <span class="value-display" id="noiseScale-value">0.003</span>
                </div>

                <!-- Add more parameters as needed for your algorithm -->
            </div>

            <div class="sidebar-divider"></div>

            <!-- ==========================================
                 OPTIONAL/VARIABLE: Colors Section
                 Include this section if your art needs
                 adjustable colors. Remove if not needed.
                 ========================================== -->
            <div class="sidebar-section" id="colors-section">
                <h3>Colors</h3>

                <!-- Example color picker - REPLACE or REMOVE -->
                <div class="control-group">
                    <label>Background</label>
                    <input type="color" id="bgColor" value="#0a0a0a" oninput="updateParam('bgColor', this.value)">
                </div>

                <div class="control-group">
                    <label>Primary</label>
                    <input type="color" id="primaryColor" value="#c96442" oninput="updateParam('primaryColor', this.value)">
                </div>
            </div>

            <div class="sidebar-divider"></div>

            <!-- ==========================================
                 FIXED: Actions Section - Do not modify
                 ========================================== -->
            <div class="sidebar-section">
                <h3>Actions</h3>
                <button class="action-btn primary" onclick="regenerate()">Regenerate</button>
                <button class="action-btn" onclick="resetParams()">Reset to Defaults</button>
                <button class="action-btn" onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>

        <!-- ============================================
             FIXED: Canvas Area - Do not modify structure
             ============================================ -->
        <div class="canvas-area" id="canvas-container">
            <!-- p5.js canvas will be placed here -->
        </div>
    </div>

    <script>
        // ============================================
        // VARIABLE: Replace everything below with your
        // algorithm's code. Keep the seed/UI functions.
        // ============================================

        // --- Parameters (VARIABLE: define your own) ---
        let defaultParams = {
            seed: 12345,
            particleCount: 1000,
            noiseScale: 0.003,
            bgColor: '#0a0a0a',
            primaryColor: '#c96442'
        };

        let params = { ...defaultParams };

        // --- Seed functions (FIXED: keep these) ---
        function updateSeedDisplay() {
            document.getElementById('seed-display').textContent = params.seed;
        }

        function prevSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            regenerate();
        }

        function nextSeed() {
            params.seed++;
            updateSeedDisplay();
            regenerate();
        }

        function randomSeed_() {
            params.seed = Math.floor(Math.random() * 99999) + 1;
            updateSeedDisplay();
            regenerate();
        }

        function jumpToSeed() {
            let val = parseInt(document.getElementById('seed-input').value);
            if (!isNaN(val) && val > 0) {
                params.seed = val;
                updateSeedDisplay();
                regenerate();
            }
        }

        // --- Parameter update (VARIABLE: extend for your params) ---
        function updateParam(name, value) {
            if (typeof defaultParams[name] === 'number') {
                params[name] = parseFloat(value);
            } else {
                params[name] = value;
            }
            let display = document.getElementById(name + '-value');
            if (display) display.textContent = value;
            regenerate();
        }

        // --- Reset (FIXED structure, VARIABLE default values) ---
        function resetParams() {
            params = { ...defaultParams };
            updateSeedDisplay();

            // Reset all UI controls to default values
            for (let key in defaultParams) {
                let el = document.getElementById(key);
                if (el) el.value = defaultParams[key];
                let display = document.getElementById(key + '-value');
                if (display) display.textContent = defaultParams[key];
            }
            regenerate();
        }

        // --- Regenerate (FIXED: keep this) ---
        function regenerate() {
            if (typeof setup === 'function') {
                clear();
                randomSeed(params.seed);
                noiseSeed(params.seed);
                setup();
            }
        }

        // --- Download (FIXED: keep this) ---
        function downloadPNG() {
            saveCanvas('algorithmic-art-' + params.seed, 'png');
        }

        // ============================================
        // VARIABLE: Your p5.js algorithm goes here
        // Replace the example below entirely
        // ============================================

        // Example: Simple flow field (REPLACE THIS)
        let particles = [];

        function setup() {
            let canvas = createCanvas(800, 800);
            canvas.parent('canvas-container');
            randomSeed(params.seed);
            noiseSeed(params.seed);
            background(params.bgColor);

            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push({
                    x: random(width),
                    y: random(height),
                    px: 0,
                    py: 0
                });
            }
        }

        function draw() {
            for (let p of particles) {
                let angle = noise(p.x * params.noiseScale, p.y * params.noiseScale) * TWO_PI * 2;
                p.px = p.x;
                p.py = p.y;
                p.x += cos(angle) * 1.5;
                p.y += sin(angle) * 1.5;

                let col = color(params.primaryColor);
                col.setAlpha(15);
                stroke(col);
                strokeWeight(0.8);
                line(p.px, p.py, p.x, p.y);

                if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
                    p.x = random(width);
                    p.y = random(height);
                }
            }
        }
    </script>
</body>
</html>
