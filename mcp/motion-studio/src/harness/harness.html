<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TFG Motion Studio — headless render harness</title>
<!-- Typekit kit the site loads globally (proxima-nova / proxima-sera).
     Optional: TFG renders with local fonts below even when offline. -->
<link rel="stylesheet" href="https://use.typekit.net/pkl5rjs.css" onerror="this.remove()">
<style>
/* Same faces the web studio gets from globals.css, served from the repo's public/. */
@font-face { font-family: 'GT America'; src: url('/public/fonts/GT-America-Standard-Light.otf') format('opentype'); font-weight: 300; }
@font-face { font-family: 'GT America'; src: url('/public/fonts/GT-America-Standard-Regular.otf') format('opentype'); font-weight: 400; }
@font-face { font-family: 'GT America'; src: url('/public/fonts/GT-America-Standard-Medium.otf') format('opentype'); font-weight: 500; }
@font-face { font-family: 'GT America'; src: url('/public/fonts/GT-America-Standard-Bold.otf') format('opentype'); font-weight: 700; }
@font-face { font-family: 'GT America Extended'; src: url('/public/fonts/GT-America-Extended-Regular.otf') format('opentype'); font-weight: 400; }
@font-face { font-family: 'GT America Extended'; src: url('/public/fonts/GT-America-Extended-Medium.otf') format('opentype'); font-weight: 500; }
@font-face { font-family: 'GT America Mono'; src: url('/public/fonts/GT-America-Mono-Regular.otf') format('opentype'); font-weight: 400; }
@font-face { font-family: 'Tobias'; src: url('/public/fonts/TobiasTRIAL-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; }
@font-face { font-family: 'Tobias'; src: url('/public/fonts/TobiasTRIAL-RegularItalic.woff2') format('woff2'); font-weight: 400; font-style: italic; }
@font-face { font-family: 'Tobias'; src: url('/public/fonts/TobiasTRIAL-Medium.woff2') format('woff2'); font-weight: 500; }
@font-face { font-family: 'Tobias'; src: url('/public/fonts/TobiasTRIAL-Bold.woff2') format('woff2'); font-weight: 700; }
@font-face { font-family: 'Michroma'; src: url('/public/fonts/Michroma-Regular.ttf') format('truetype'); font-weight: 400; }
</style>
</head>
<body>
<script src="/harness.js"></script>
</body>
</html>
